name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web files
        run: npx cap sync android

      - name: Force copy index.html
        run: |
          cp www/index.html android/app/src/main/assets/public/index.html
          echo "index.html force copied to android assets"

      - name: Patch styles.xml
        run: python3 patch_styles.py

      - name: Set app icon
        run: |
          pip install pillow --quiet
          python3 resize_icon.py
          # Tüm mipmap klasörlerine zorla kopyala
          for dir in android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi; do
            mkdir -p "$dir"
            cp icon_512_final.png "$dir/ic_launcher.png"
            cp icon_512_final.png "$dir/ic_launcher_round.png"
            echo "Copied to $dir"
          done
          # adaptive icon klasörünü sil
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          echo "Removed adaptive icons"
          # AndroidManifest - icon referansını güncelle
          sed -i 's/android:roundIcon="[^"]*"//g' android/app/src/main/AndroidManifest.xml
          echo "Manifest updated"
          ls android/app/src/main/res/mipmap-xxxhdpi/

      - name: Patch MainActivity for back button
        run: |
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          echo "Found: $MAIN"
          cp MainActivity.java "$MAIN"
          echo "MainActivity patched"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/stackgame.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/stackgame.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stack-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
