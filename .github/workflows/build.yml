name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web files
        run: npx cap sync android

      - name: Disable WebView tap highlight
        run: |
          # WebView'da tap highlight'ı kapat
          MAIN_ACTIVITY=$(find android -name "MainActivity.kt" -o -name "MainActivity.java" | head -1)
          if [ -f "$MAIN_ACTIVITY" ]; then
            echo "Found: $MAIN_ACTIVITY"
          fi
          # styles.xml — tap highlight rengi kapat
          STYLES="android/app/src/main/res/values/styles.xml"
          if [ -f "$STYLES" ]; then
            sed -i 's|</style>|    <item name="android:colorControlHighlight">@android:color/transparent</item>\n    <item name="colorControlHighlight">@android:color/transparent</item>\n</style>|' "$STYLES"
            echo "styles.xml updated"
            cat "$STYLES"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stack-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
