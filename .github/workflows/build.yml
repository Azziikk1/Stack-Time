name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK 35
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web files
        run: npx cap sync android

      - name: Force copy index.html
        run: |
          cp www/index.html android/app/src/main/assets/public/index.html

      - name: Patch styles.xml
        run: python3 patch_styles.py

      - name: Patch SDK versions and Gradle plugin to support 35
        run: |
          python3 - << 'PYEOF'
          import re, os

          vpath = 'android/variables.gradle'
          if os.path.exists(vpath):
              with open(vpath, 'r') as f:
                  content = f.read()
              content = re.sub(r'targetSdkVersion\s*=\s*\d+', 'targetSdkVersion = 35', content)
              content = re.sub(r'compileSdkVersion\s*=\s*\d+', 'compileSdkVersion = 35', content)
              with open(vpath, 'w') as f:
                  f.write(content)
              print("variables.gradle patched")

          rpath = 'android/build.gradle'
          if os.path.exists(rpath):
              with open(rpath, 'r') as f:
                  content = f.read()
              content = re.sub(r"com\.android\.tools\.build:gradle:[0-9.]+", "com.android.tools.build:gradle:8.3.0", content)
              with open(rpath, 'w') as f:
                  f.write(content)
              print("root build.gradle patched")

          wpath = 'android/gradle/wrapper/gradle-wrapper.properties'
          if os.path.exists(wpath):
              with open(wpath, 'r') as f:
                  content = f.read()
              content = re.sub(r'gradle-[0-9.]+-all\.zip', 'gradle-8.4-all.zip', content)
              content = re.sub(r'gradle-[0-9.]+-bin\.zip', 'gradle-8.4-bin.zip', content)
              with open(wpath, 'w') as f:
                  f.write(content)
              print("gradle-wrapper patched")
          PYEOF

      - name: Upgrade Capacitor to fix BroadcastReceiver crash
        run: |
          npm install @capacitor/core@latest @capacitor/android@latest @capacitor/cli@latest --legacy-peer-deps
          npx cap sync android

      - name: Force copy index.html again after sync
        run: |
          cp www/index.html android/app/src/main/assets/public/index.html

      - name: Set app icon
        run: |
          pip install pillow --quiet
          python3 resize_icon.py
          for dir in android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi; do
            mkdir -p "$dir"
            cp icon_512_final.png "$dir/ic_launcher.png"
            cp icon_512_final.png "$dir/ic_launcher_round.png"
          done
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          sed -i 's/android:roundIcon="[^"]*"//g' android/app/src/main/AndroidManifest.xml

      - name: Patch MainActivity for back button
        run: |
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          cp MainActivity.java "$MAIN"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/stackgame.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/stackgame.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: stack-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
